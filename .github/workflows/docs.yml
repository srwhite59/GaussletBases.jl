name: Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cartesian-authority:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Check Cartesian authority
        run: |
          julia --startup-file=no --project=docs docs/check_cartesian_authority.jl --check
          julia --startup-file=no --project=docs docs/check_cartesian_authority.jl --self-test

  docs:
    needs: cartesian-authority
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: read
      statuses: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Instantiate docs environment
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'

      - name: Build docs
        run: julia --project=docs docs/make.jl
